<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calzy OS | Premium Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --purple-glow: #9333ea; --dark-bg: #030303; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top right, #1e0b36 0%, #030303 50%);
            color: #ffffff; 
            min-height: 100vh; 
            overflow: hidden;
            display: flex; align-items: center; justify-content: center; 
        }

        .premium-card { 
            background: rgba(10, 10, 10, 0.6); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(147, 51, 234, 0.2); 
            border-radius: 3rem; 
            width: 100%; max-width: 450px; 
            padding: 4rem 3rem; 
            box-shadow: 0 0 80px rgba(0, 0, 0, 1), 0 0 30px rgba(147, 51, 234, 0.1);
            position: relative;
        }

        .premium-card::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(147, 51, 234, 0.3), transparent);
            border-radius: 3rem; z-index: -1;
        }

        .logo-text { font-family: 'Orbitron', sans-serif; letter-spacing: -2px; }

        .input-premium { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(147, 51, 234, 0.1); 
            padding: 1.3rem; border-radius: 1.5rem; 
            width: 100%; text-align: center; color: white;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-premium:focus { 
            background: rgba(147, 51, 234, 0.05);
            border-color: var(--purple-glow); outline: none;
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.2);
        }

        .btn-main { 
            background: linear-gradient(135deg, #9333ea 0%, #581c87 100%);
            color: white; font-weight: 700; padding: 1.3rem; border-radius: 1.5rem; 
            width: 100%; transition: 0.4s; border: none; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-main:hover { 
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(147, 51, 234, 0.4);
        }

        .welcome-msg { animation: fadeInDown 0.8s ease-out; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="premium-card">
        <div class="text-center mb-12">
            <h1 class="logo-text text-6xl font-black text-white italic">CALZY<span class="text-purple-600">OS</span></h1>
            <div id="welcomeText" class="welcome-msg mt-4">
                <p class="text-zinc-500 text-xs tracking-[5px] uppercase">Elite Health System</p>
            </div>
        </div>

        <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center bg-white/5 hover:bg-white/10 border border-white/10 p-4 rounded-2xl mb-6 transition-all group">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 ml-3">
            <span class="font-bold text-sm">استكمال بواسطة جوجل</span>
        </button>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#0a0a0a] px-4 text-zinc-600">أو الهوية الرقمية</span></div>
        </div>

        <div id="phoneStep" class="space-y-4">
            <input type="tel" id="userPhone" class="input-premium" placeholder="2010xxxxxxxx" dir="ltr">
            <button onclick="sendOTP()" id="sendBtn" class="btn-main">دخول المحاربين</button>
        </div>

        <div id="otpStep" class="hidden space-y-4">
            <div class="text-center">
                <p class="text-purple-400 font-bold">تفقد الواتساب الخاص بك</p>
                <p class="text-[10px] text-zinc-500 mt-1">أرسلنا كود التحقق السري</p>
            </div>
            <input type="text" id="otpInput" class="input-premium text-3xl tracking-[10px]" placeholder="000000">
            <button onclick="verifyOTP()" id="verifyBtn" class="btn-main">تأكيد الهوية</button>
        </div>

        <div class="mt-12 text-center opacity-20">
            <p class="text-[8px] tracking-[6px] uppercase">Design by Fixaa Arab Software</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9wQsKHn4z0ERIny25UKXsiOhJBOZYmwo",
            authDomain: "clox-1e0b1.firebaseapp.com",
            projectId: "clox-1e0b1",
            storageBucket: "clox-1e0b1.firebasestorage.app",
            messagingSenderId: "356484321549",
            appId: "1:356484321549:web:758ab4c0f6b6c3f2b5a044"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const API_URL = "https://api.ultramsg.com/instance171381/messages/chat";
        const TOKEN = "5fh5hfytsg5mml9n";

        let generatedOTP = "";
        let phoneNumber = "";

        // فحص نوع المستخدم للترحيب
        async function handleWelcome(uid, name) {
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);
            const welcomeDiv = document.getElementById('welcomeText');

            if (userSnap.exists()) {
                welcomeDiv.innerHTML = `<p class="text-purple-400 font-bold animate-pulse">مرحباً بعودتك، ${name || 'يا محارب'}</p>`;
            } else {
                welcomeDiv.innerHTML = `<p class="text-green-400 font-bold">مرحباً بك في عائلة Calzy</p>`;
            }
        }

        window.loginWithGoogle = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                await handleWelcome(user.uid, user.displayName);
                
                await setDoc(doc(db, "users", user.uid), {
                    name: user.displayName,
                    email: user.email,
                    lastLogin: serverTimestamp()
                }, { merge: true });

                setTimeout(() => window.location.href = "macs.html", 2000);
            } catch (error) { console.error(error); }
        };

        window.sendOTP = async () => {
            phoneNumber = document.getElementById('userPhone').value.trim();
            if (!phoneNumber.startsWith('20')) phoneNumber = '20' + phoneNumber.replace(/^0+/, '');

            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            const params = new URLSearchParams({
                "token": TOKEN,
                "to": phoneNumber,
                "body": `*CALZY OS | THE WARRIOR*\n\nكود الدخول الخاص بك: *${generatedOTP}*\n\nاستعد لكسر حدودك اليوم.`
            });

            await fetch(API_URL, { method: 'POST', body: params });
            document.getElementById('phoneStep').classList.add('hidden');
            document.getElementById('otpStep').classList.remove('hidden');
        };

        window.verifyOTP = async () => {
            if (document.getElementById('otpInput').value === generatedOTP) {
                // في حالة رقم الهاتف نعتبره مستخدم بناء على الرقم
                await handleWelcome(phoneNumber, "يا بطل");
                setTimeout(() => window.location.href = "macs.html", 2000);
            } else { alert("الكود غير صحيح"); }
        };
    </script>
</body>
</html>
