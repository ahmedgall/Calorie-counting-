<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta name="monetag" content="029fb0f5a7de2c3946036f5aac032d6a">
    
    
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calzy OS | Premium Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --purple-glow: #9333ea; --dark-bg: #030303; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top right, #1e0b36 0%, #030303 50%);
            color: #ffffff; 
            min-height: 100vh; 
            overflow: hidden;
            display: flex; align-items: center; justify-content: center; 
        }

        .premium-card { 
            background: rgba(10, 10, 10, 0.6); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(147, 51, 234, 0.2); 
            border-radius: 3rem; 
            width: 100%; max-width: 450px; 
            padding: 3.5rem 2.5rem; 
            box-shadow: 0 0 80px rgba(0, 0, 0, 1), 0 0 30px rgba(147, 51, 234, 0.1);
            position: relative;
        }

        .logo-text { font-family: 'Orbitron', sans-serif; letter-spacing: -2px; }

        .input-premium { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(147, 51, 234, 0.1); 
            padding: 1.1rem; border-radius: 1.2rem; 
            width: 100%; text-align: center; color: white;
            transition: 0.4s;
        }

        .input-premium:focus { 
            border-color: var(--purple-glow); outline: none;
            background: rgba(147, 51, 234, 0.05);
        }

        .btn-main { 
            background: linear-gradient(135deg, #9333ea 0%, #581c87 100%);
            color: white; font-weight: 700; padding: 1.1rem; border-radius: 1.2rem; 
            width: 100%; transition: 0.3s; border: none; cursor: pointer;
        }

        .btn-main:hover { transform: translateY(-2px); opacity: 0.9; }
        .hidden { display: none; }
        
        /* Loader بسيط للتحويل */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--purple-glow);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="premium-card">
        <div class="text-center mb-10">
            <h1 class="logo-text text-6xl font-black text-white italic">CALZY<span class="text-purple-600">OS</span></h1>
            <div id="welcomeText" class="mt-4">
                <p class="text-zinc-500 text-xs tracking-[5px] uppercase">Elite Health System</p>
            </div>
        </div>

        <!-- زر جوجل -->
        <button id="googleBtn" onclick="loginWithGoogle()" class="w-full flex items-center justify-center bg-white/5 hover:bg-white/10 border border-white/10 p-4 rounded-2xl mb-6 transition-all group">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 ml-3">
            <span class="font-bold text-sm">استكمال بواسطة جوجل</span>
        </button>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#0a0a0a] px-4 text-zinc-600">أو الهوية الرقمية</span></div>
        </div>

        <!-- مرحلة رقم الهاتف -->
        <div id="phoneStep" class="space-y-4">
            <input type="tel" id="userPhone" class="input-premium" placeholder="2010xxxxxxxx" dir="ltr">
            <button onclick="sendOTP()" id="sendBtn" class="btn-main">دخول المحاربين</button>
        </div>

        <!-- مرحلة الـ OTP -->
        <div id="otpStep" class="hidden space-y-4">
            <div class="text-center">
                <p class="text-purple-400 font-bold">تفقد الواتساب الخاص بك</p>
            </div>
            <input type="text" id="otpInput" class="input-premium text-3xl tracking-[10px]" placeholder="000000">
            <button onclick="verifyOTP()" id="verifyBtn" class="btn-main">تأكيد الهوية</button>
        </div>

        <div class="mt-12 text-center opacity-20">
            <p class="text-[8px] tracking-[6px] uppercase">Design by Fixaa Arab Software</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9wQsKHn4z0ERIny25UKXsiOhJBOZYmwo",
            authDomain: "clox-1e0b1.firebaseapp.com",
            projectId: "clox-1e0b1",
            storageBucket: "clox-1e0b1.firebasestorage.app",
            messagingSenderId: "356484321549",
            appId: "1:356484321549:web:758ab4c0f6b6c3f2b5a044"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const API_URL = "https://api.ultramsg.com/instance171381/messages/chat";
        const TOKEN = "5fh5hfytsg5mml9n";

        let generatedOTP = "";
        let phoneNumber = "";

        // تسجيل جوجل
        window.loginWithGoogle = async () => {
            const btn = document.getElementById('googleBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div> جاري التحقق...';

            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                await setDoc(doc(db, "users", user.uid), {
                    name: user.displayName,
                    email: user.email,
                    lastLogin: serverTimestamp()
                }, { merge: true });

                window.location.href = "macs.html"; // تحويل فوري
            } catch (error) {
                console.error(error);
                btn.disabled = false;
                btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 ml-3"><span class="font-bold text-sm">استكمال بواسطة جوجل</span>';
                alert("حدث خطأ في الاتصال بجوجل");
            }
        };

        // إرسال كود الواتساب
        window.sendOTP = async () => {
            const sendBtn = document.getElementById('sendBtn');
            phoneNumber = document.getElementById('userPhone').value.trim();
            
            if (!phoneNumber) return alert("برجاء إدخال الرقم");
            if (!phoneNumber.startsWith('20')) phoneNumber = '20' + phoneNumber.replace(/^0+/, '');

            sendBtn.disabled = true;
            sendBtn.innerText = "جاري الإرسال...";

            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            const params = new URLSearchParams({
                "token": TOKEN,
                "to": phoneNumber,
                "body": `*CALZY OS | THE WARRIOR*\n\nكود الدخول الخاص بك: *${generatedOTP}*\n\nاستعد لكسر حدودك اليوم.`
            });

            try {
                await fetch(API_URL, { method: 'POST', body: params });
                document.getElementById('phoneStep').classList.add('hidden');
                document.getElementById('otpStep').classList.remove('hidden');
            } catch (e) {
                alert("فشل إرسال الرسالة");
                sendBtn.disabled = false;
                sendBtn.innerText = "دخول المحاربين";
            }
        };

        // التحقق والتحويل
        window.verifyOTP = () => {
            const input = document.getElementById('otpInput').value;
            if (input === generatedOTP) {
                window.location.href = "macs.html"; // تحويل فوري
            } else {
                alert("الكود غير صحيح");
            }
        };
    </script>
</body>
</html>
