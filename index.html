<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calzy OS | Premium Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --purple-glow: #9333ea; --dark-bg: #030303; }
        body { 
            font-family: 'Cairo', sans-serif; background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top right, #1e0b36 0%, #030303 50%);
            color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; 
        }
        .premium-card { 
            background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(30px); 
            border: 1px solid rgba(147, 51, 234, 0.2); border-radius: 3rem; 
            width: 100%; max-width: 450px; padding: 4rem 3rem; 
            box-shadow: 0 0 80px rgba(0, 0, 0, 1); position: relative;
        }
        .input-premium { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(147, 51, 234, 0.1); 
            padding: 1.3rem; border-radius: 1.5rem; width: 100%; text-align: center; color: white;
        }
        .btn-main { 
            background: linear-gradient(135deg, #9333ea 0%, #581c87 100%);
            color: white; padding: 1.3rem; border-radius: 1.5rem; width: 100%; cursor: pointer;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="premium-card">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black text-white italic">CALZY<span class="text-purple-600">OS</span></h1>
            <div id="welcomeText" class="mt-4"><p class="text-zinc-500 text-xs tracking-[5px] uppercase">Elite Health System</p></div>
        </div>

        <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center bg-white/5 hover:bg-white/10 border border-white/10 p-4 rounded-2xl mb-6">
            <span class="font-bold text-sm">استكمال بواسطة جوجل</span>
        </button>

        <div id="phoneStep" class="space-y-4">
            <input type="tel" id="userPhone" class="input-premium" placeholder="2010xxxxxxxx" dir="ltr">
            <button onclick="sendOTP()" class="btn-main">دخول المحاربين</button>
        </div>

        <div id="otpStep" class="hidden space-y-4">
            <input type="text" id="otpInput" class="input-premium text-3xl tracking-[10px]" placeholder="000000">
            <button onclick="verifyOTP()" class="btn-main">تأكيد الهوية</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9wQsKHn4z0ERIny25UKXsiOhJBOZYmwo",
            authDomain: "clox-1e0b1.firebaseapp.com",
            projectId: "clox-1e0b1",
            storageBucket: "clox-1e0b1.firebasestorage.app",
            messagingSenderId: "356484321549",
            appId: "1:356484321549:web:758ab4c0f6b6c3f2b5a044"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const API_URL = "https://api.ultramsg.com/instance171381/messages/chat";
        const TOKEN = "5fh5hfytsg5mml9n";

        let generatedOTP = "";
        let phoneNumber = "";

        window.loginWithGoogle = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                sessionStorage.setItem('userPhone', result.user.email); // تخزين الإيميل كمعرف
                window.location.href = "macs.html";
            } catch (error) { console.error("Google Error:", error); }
        };

        window.sendOTP = async () => {
            phoneNumber = document.getElementById('userPhone').value.trim();
            if (!phoneNumber.startsWith('20')) phoneNumber = '20' + phoneNumber.replace(/^0+/, '');

            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            const params = new URLSearchParams();
            params.append("token", TOKEN);
            params.append("to", phoneNumber);
            params.append("body", `كود الدخول لـ Calzy OS: ${generatedOTP}`);

            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: params
                });
                
                if(response.ok) {
                    document.getElementById('phoneStep').classList.add('hidden');
                    document.getElementById('otpStep').classList.remove('hidden');
                } else {
                    alert("خطأ في الاتصال بخدمة الواتساب");
                }
            } catch(e) { console.error(e); }
        };

        window.verifyOTP = async () => {
            if (document.getElementById('otpInput').value === generatedOTP) {
                sessionStorage.setItem('userPhone', phoneNumber); // تخزين الرقم للجلسة
                window.location.href = "macs.html";
            } else { alert("الكود غير صحيح"); }
        };
    </script>
</body>
</html>
