<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحليل الجسم | Calzy OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #8b5cf6; --bg: #05070a; --card: #111827; --text: #f9fafb; --s: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; padding-bottom: 100px; }
        
        .glass-card { background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .title-gradient { background: linear-gradient(120deg, #8b5cf6, #d8b4fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
        input { width: 100%; background: #1f2937; border: 1px solid #374151; border-radius: 12px; padding: 12px; color: white; outline: none; }
        
        .btn-save { width: 100%; background: var(--p); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-save:active { transform: scale(0.95); }

        canvas { width: 100% !important; height: 200px !important; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { text-align: center; padding: 15px; background: rgba(139, 92, 246, 0.05); border-radius: 15px; border: 1px solid rgba(139, 92, 246, 0.1); }
        .stat-val { display: block; font-size: 18px; font-weight: 900; color: var(--p); }
        .stat-lab { font-size: 11px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="header">
   
        <h2 class="title-gradient">تحليل الجسم والتقدم</h2>
    </div>

    <div class="glass-card">
        <label>مخطط تغير الوزن</label>
        <canvas id="weightChart"></canvas>
    </div>

    <div class="glass-card">
        <div class="stats-grid" style="margin-bottom: 15px;">
            <div class="input-group">
                <label>الوزن الحالي (كجم)</label>
                <input type="number" id="newWeight" placeholder="0.0">
            </div>
            <div class="input-group">
                <label>نسبة الدهون (%)</label>
                <input type="number" id="newFat" placeholder="0.0">
            </div>
        </div>
        <button class="btn-save" onclick="saveProgress()">تحديث البيانات</button>
    </div>

    <div class="glass-card">
        <label style="margin-bottom: 15px; display: block;">ملخص القياسات</label>
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-lab">أعلى وزن</span>
                <span class="stat-val" id="maxWeight">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-lab">أقل وزن</span>
                <span class="stat-val" id="minWeight">0</span>
            </div>
        </div>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('calzy_history')) || { weights: [], dates: [], fats: [] };

        function initChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.dates.slice(-7), // آخر 7 أيام
                    datasets: [{
                        label: 'الوزن',
                        data: history.weights.slice(-7),
                        borderColor: '#8b5cf6',
                        backgroundColor: 'rgba(139, 92, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#1f2937' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
            updateStats();
        }

        function saveProgress() {
            const w = document.getElementById('newWeight').value;
            const f = document.getElementById('newFat').value;
            const d = new Date().toLocaleDateString('ar-EG', {month:'short', day:'numeric'});

            if(!w) return alert('برجاء إدخال الوزن');

            history.weights.push(parseFloat(w));
            history.fats.push(parseFloat(f) || 0);
            history.dates.push(d);

            localStorage.setItem('calzy_history', JSON.stringify(history));
            location.reload(); // لتحديث الرسم البياني
        }

        function updateStats() {
            if(history.weights.length > 0) {
                document.getElementById('maxWeight').innerText = Math.max(...history.weights) + " كجم";
                document.getElementById('minWeight').innerText = Math.min(...history.weights) + " كجم";
            }
        }

        window.onload = initChart;
    </script>
</body>
</html>
