<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calzy OS | Warrior Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #a855f7; --bg: #020202; --card: rgba(15, 15, 15, 0.9); }
        body { 
            font-family: 'Cairo', sans-serif; background: var(--bg); color: white; overflow-x: hidden; padding-bottom: 120px;
            background-image: radial-gradient(circle at top left, #1a0b2e 0%, #020202 60%);
        }
        
        .glass-card { 
            background: var(--card); backdrop-filter: blur(20px); 
            border: 1px solid rgba(168, 85, 247, 0.15); border-radius: 2rem;
            transition: 0.3s;
        }

        /* Level Badge Style */
        .level-badge {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #a855f7 0%, #6b21a8 100%);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Bottom Nav - Same style as Dashboard */
        .bottom-nav { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            background: rgba(10, 10, 10, 0.9); height: 75px; border-radius: 2.5rem;
            display: flex; justify-content: space-around; align-items: center; 
            border: 1px solid rgba(255,255,255,0.1); 
            backdrop-filter: blur(20px); z-index: 100;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; transition: all 0.3s ease; padding: 10px; }
        .nav-item:active { transform: scale(0.9); }

        .add-btn-main { 
            background: linear-gradient(135deg, #a855f7, #6b21a8); width: 60px; height: 60px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; margin-top: -50px; 
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.4); cursor: pointer;
        }

        /* Services Button with Glow */
        .btn-services {
            background: linear-gradient(135deg, #111 0%, #000 100%);
            border: 1px solid rgba(168, 85, 247, 0.3);
            transition: 0.4s;
        }
        .btn-services:hover {
            border-color: var(--purple);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
            transform: translateY(-2px);
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="p-8 text-center mt-6">
        <div class="relative w-24 h-24 mx-auto mb-6">
            <div class="absolute inset-0 bg-purple-600 rounded-full blur-xl opacity-30 animate-pulse"></div>
            <div class="glass-card w-24 h-24 rounded-full flex items-center justify-center border-purple-500/50 relative z-10">
                <svg class="w-12 h-12 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/></svg>
            </div>
        </div>
        <h2 id="u-name" class="text-3xl font-black mb-1">جاري التحميل...</h2>
        <p class="text-zinc-500 text-sm tracking-widest uppercase mb-4">Fixaa Warrior</p>
        <div class="glass-card inline-block px-6 py-2 border-purple-500/30">
            <span class="text-xs text-zinc-400 ml-2">مستوى المحارب:</span>
            <span id="u-level" class="level-badge text-xl font-black">RECRUIT</span>
        </div>
    </div>

    <div class="px-6 grid grid-cols-2 gap-4 mb-8">
        <div class="glass-card p-6 flex items-center gap-4">
            <div class="text-purple-400 rounded-full bg-purple-950 p-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 12h12l3-12H3zM9 6v14M15 6v14M5 6a2 2 0 012-2h10a2 2 0 012 2"/></svg>
            </div>
            <div>
                <span class="text-zinc-500 text-xs block">الوزن</span>
                <span id="u-weight" class="text-xl font-bold">-- كجم</span>
            </div>
        </div>
        <div class="glass-card p-6 flex items-center gap-4">
            <div class="text-blue-400 rounded-full bg-blue-950 p-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 4v16m8-16v16M4 8h16M4 16h16"/></svg>
            </div>
            <div>
                <span class="text-zinc-500 text-xs block">الطول</span>
                <span id="u-height" class="text-xl font-bold">-- سم</span>
            </div>
        </div>
        <div class="glass-card p-6 flex items-center gap-4">
            <div class="text-orange-400 rounded-full bg-orange-950 p-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            </div>
            <div>
                <span class="text-zinc-500 text-xs block">العمر</span>
                <span id="u-age" class="text-xl font-bold">-- سنة</span>
            </div>
        </div>
        <div class="glass-card p-6 flex items-center gap-4">
            <div class="text-green-400 rounded-full bg-green-950 p-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <div>
                <span class="text-zinc-500 text-xs block">الهدف</span>
                <span id="u-goal" class="text-sm font-bold">--</span>
            </div>
        </div>
    </div>

    <div class="px-6 mb-10">
        <a href="vmn.html" class="btn-services glass-card w-full p-6 flex justify-between items-center group">
            <div class="flex items-center gap-4">
                <svg class="w-7 h-7 text-purple-500 group-hover:animate-spin" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                <span class="font-bold">خدمات المحاربين الإضافية</span>
            </div>
            <svg class="w-5 h-5 text-zinc-600 group-hover:text-purple-400 transition-transform group-hover:translate-x-[-5px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item text-zinc-600 hover:text-purple-400">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </a>
        <div class="add-btn-main">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 5v14M5 12h14"/></svg>
        </div>
        <a href="me.html" class="nav-item text-purple-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9wQsKHn4z0ERIny25UKXsiOhJBOZYmwo",
            authDomain: "clox-1e0b1.firebaseapp.com",
            projectId: "clox-1e0b1",
            storageBucket: "clox-1e0b1.firebasestorage.app",
            messagingSenderId: "356484321549",
            appId: "1:356484321549:web:758ab4c0f6b6c3f2b5a044"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userId = sessionStorage.getItem('userPhone') || "guest";

        // أهداف ترجمة الأهداف
        const goalMap = { 'cut': 'تنشيف', 'maintain': 'ثبات', 'bulk': 'تضخيم' };

        // نظام المستويات بناءً على أيام الالتزام (تسجيل الوزن)
        const levels = [
            { days: 0, name: "RECRUIT" },
            { days: 7, name: "SOLDIER" },
            { days: 30, name: "VETERAN" },
            { days: 90, name: "ELITE" },
            { days: 180, name: "WARRIOR" }
        ];

        async function loadProfile() {
            try {
                const userRef = doc(db, "user_metrics", userId);
                const snap = await getDoc(userRef);

                if (snap.exists()) {
                    const d = snap.data();
                    
                    // ملء البيانات الأساسية
                    document.getElementById('u-name').innerText = d.name;
                    document.getElementById('u-weight').innerText = `${d.weight} كجم`;
                    document.getElementById('u-height').innerText = `${d.height} سم`;
                    document.getElementById('u-age').innerText = `${d.age} سنة`;
                    document.getElementById('u-goal').innerText = goalMap[d.goal] || '--';

                    // حساب المستوى بناءً على عدد التسجيلات في كولكشن فرعي (مثلاً weight_logs)
                    // ملاحظة: هذا يتطلب أن تكون قد أنشأت كولكشن فرعي لتسجيل الأوزان اليومية
                    const logsSnap = await getDocs(collection(db, "user_metrics", userId, "weight_logs"));
                    const commitmentDays = logsSnap.size;

                    // تحديد المستوى
                    let currentLevel = levels[0].name;
                    for (let i = levels.length - 1; i >= 0; i--) {
                        if (commitmentDays >= levels[i].days) {
                            currentLevel = levels[i].name;
                            break;
                        }
                    }
                    document.getElementById('u-level').innerText = currentLevel;

                } else {
                    window.location.href = "setup.html";
                }
            } catch (e) { console.error(e); }
        }

        loadProfile();
    </script>
</body>
</html>
