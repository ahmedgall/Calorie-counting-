<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الرتب | Calzy OS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #8b5cf6; --bg: #030712; --card: #111827; --gold: #fbbf24; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; padding: 20px; padding-bottom: 100px; }

        /* حاوية الرتبة الحالية */
        .rank-hero {
            background: linear-gradient(180deg, rgba(139, 92, 246, 0.2) 0%, transparent 100%);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.1);
            margin-bottom: 25px;
        }

        .svg-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            filter: drop-shadow(0 0 15px var(--p));
        }

        .user-welcome { font-size: 14px; color: var(--p); font-weight: bold; margin-bottom: 5px; }
        .current-rank-title { font-size: 28px; font-weight: 900; margin-bottom: 20px; }

        /* شريط XP بتصميم مودرن */
        .xp-wrapper { background: #1f2937; height: 12px; border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid #374151; }
        .xp-fill { 
            height: 100%; background: linear-gradient(90deg, #8b5cf6, #d8b4fe); 
            width: 0%; transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        /* كروت الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #1f2937; text-align: center; }
        .stat-box small { font-size: 11px; color: #94a3b8; display: block; }
        .stat-box span { font-size: 18px; font-weight: 900; color: var(--p); }

        /* قائمة الرتب بالـ SVG */
        .ranks-list { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #1f2937; }
        .rank-item { 
            display: flex; align-items: center; gap: 15px; padding: 15px; 
            border-bottom: 1px solid #1f2937; opacity: 0.3; transition: 0.3s;
        }
        .rank-item.active { opacity: 1; transform: scale(1.02); }
        .rank-item svg { width: 40px; height: 40px; }
        .rank-info h4 { font-size: 16px; font-weight: 900; }
        .rank-info p { font-size: 11px; color: #94a3b8; }

        nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid #1f2937; }
    </style>
</head>
<body>

    <div class="rank-hero">
        <p class="user-welcome">يا  <span id="userName"></span></p>
        <div class="svg-container" id="mainIcon">
            </div>
        <h2 class="current-rank-title" id="rankTitle">جارِ الحساب...</h2>
        
        <div class="xp-wrapper">
            <div class="xp-fill" id="xpFill"></div>
        </div>
        <p style="font-size: 12px;" id="xpStatus">باقي 0 يوم على الترقية</p>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <small>إجمالي الأيام</small>
            <span id="totalDays">0</span>
        </div>
        <div class="stat-box">
            <small>نسبة الالتزام</small>
            <span id="commitRate">0%</span>
        </div>
    </div>

    <div class="ranks-list">
        <div class="rank-item" id="item0">
            <svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
            <div class="rank-info"><h4>مستوى: البداية</h4><p>من 1 إلى 30 يوم التزام</p></div>
        </div>
        <div class="rank-item" id="item1">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <div class="rank-info"><h4>مستوى: الوحش</h4><p>من 31 إلى 60 يوم التزام</p></div>
        </div>
        <div class="rank-item" id="item2">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            <div class="rank-info"><h4>مستوى: الأسطورة</h4><p>أكثر من 60 يوم التزام</p></div>
        </div>
    </div>


    <script>
        const svgs = [
            `<svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>`,
            `<svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`,
            `<svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`
        ];

        function loadRankData() {
            // سحب البيانات من LocalStorage
            const userName = localStorage.getItem('user_name') || 'بطل كالزي';
            const challengeData = JSON.parse(localStorage.getItem('calzy_challenges')) || { doneDays: [] };
            
            const totalDone = challengeData.doneDays.length;
            const currentLevel = Math.floor(totalDone / 30);
            const daysInCurrentLevel = totalDone % 30;
            const progress = (daysInCurrentLevel / 30) * 100;

            const rankNames = ["مبتدئ طموح", "وحش كاسر", "أسطورة الصالة"];
            
            // تحديث العناصر
            document.getElementById('userName').innerText = userName;
            document.getElementById('totalDays').innerText = totalDone;
            document.getElementById('rankTitle').innerText = rankNames[Math.min(currentLevel, 2)];
            document.getElementById('mainIcon').innerHTML = svgs[Math.min(currentLevel, 2)];
            document.getElementById('xpFill').style.width = progress + '%';
            document.getElementById('xpStatus').innerText = `باقي ${30 - daysInCurrentLevel} يوم للرتبة التالية`;
            document.getElementById('commitRate').innerText = Math.round((totalDone / 30) * 100) + '%';

            // تفعيل القائمة
            const levelIndex = Math.min(currentLevel, 2);
            document.getElementById('item' + levelIndex).classList.add('active');
        }

        window.onload = loadRankData;
    </script>
</body>
</html>
