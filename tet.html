    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #a855f7; --bg: #030712; --card: #111827; --gold: #fbbf24; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; padding: 15px; line-height: 1.6; }

        .header { text-align: center; margin: 20px 0; }
        .header h1 { font-size: 24px; font-weight: 900; background: linear-gradient(to right, #fff, var(--p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats { font-size: 11px; color: #6b7280; margin-top: 5px; }

        .search-container { position: sticky; top: 10px; z-index: 1000; margin-bottom: 20px; }
        .search-bar { background: var(--card); border: 1px solid var(--p); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; text-align: right; }

        .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 10px; scrollbar-width: none; }
        .filter-btn { background: #1f2937; border: none; color: #94a3b8; padding: 6px 15px; border-radius: 20px; font-size: 11px; white-space: nowrap; cursor: pointer; transition: 0.3s; }
        .filter-btn.active { background: var(--p); color: white; }

        .supp-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .supp-card { background: var(--card); border-radius: 18px; padding: 18px; border: 1px solid #1f2937; position: relative; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .category-pill { font-size: 9px; background: rgba(168, 85, 247, 0.2); color: var(--p); padding: 2px 8px; border-radius: 5px; font-weight: bold; }
        .supp-card h3 { font-size: 17px; color: #fff; margin: 8px 0 5px 0; }
        .desc { font-size: 12px; color: #94a3b8; margin-bottom: 12px; }
        .dose-box { background: rgba(251, 191, 36, 0.07); border-right: 3px solid var(--gold); padding: 8px; font-size: 11px; color: var(--gold); border-radius: 4px; font-weight: bold; }
        
        .no-data { text-align: center; padding: 50px; color: #4b5563; display: none; }

        const container = document.getElementById('container');
        const countDisplay = document.getElementById('counter');

        function render(items) {
            container.innerHTML = '';
            if (items.length === 0) {
                document.getElementById('empty').style.display = 'block';
                countDisplay.innerText = `لا توجد نتائج`;
                return;
            }
            document.getElementById('empty').style.display = 'none';
            
            items.forEach(s => {
                const card = document.createElement('div');
                card.className = 'supp-card';
                card.innerHTML = `
                    <span class="category-pill">${s.c}</span>
                    <h3>${s.n}</h3>
                    <p class="desc">${s.d}</p>
                    <div class="dose-box">💡 الجرعة المقترحة: ${s.g}</div>
                `;
                container.appendChild(card);
            });
            countDisplay.innerText = `نعرض الآن ${items.length} مكمل غذائي من الموسوعة`;
        }

        function search() {
            const txt = document.getElementById('searchInput').value.toLowerCase();
            const filtered = data.filter(i => 
                i.n.toLowerCase().includes(txt) || 
                i.c.toLowerCase().includes(txt) ||
                i.d.toLowerCase().includes(txt)
            );
            render(filtered);
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(cat === 'الكل') return render(data);
            const filtered = data.filter(i => i.c === cat);
            render(filtered);
        }

        // تشغيل الوظيفة عند التحميل
        window.onload = () => {
            render(data);
        };
