<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calzy Train Pro | الموسوعة الكاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #8b5cf6; --s: #10b981; --bg: #030712; --card: #111827; --text: #f9fafb; --accent: #3b82f6; --d: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .hero { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .hero h1 { font-weight: 900; font-size: 28px; background: linear-gradient(to left, var(--p), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .glass-panel { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px; }
        .input-label { display: block; margin-bottom: 8px; font-size: 12px; color: var(--p); font-weight: 800; }
        select { width: 100%; padding: 14px; border-radius: 14px; border: 2px solid #1f2937; background: #0f172a; color: white; margin-bottom: 12px; font-weight: 600; outline: none; }
        
        .btn-generate { width: 100%; padding: 16px; border-radius: 16px; border: none; background: linear-gradient(135deg, var(--p), #6d28d9); color: white; font-weight: 900; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-generate:active { transform: scale(0.98); }

        .timer-hub { background: #020617; border: 2px solid var(--p); border-radius: 20px; padding: 15px; text-align: center; margin-bottom: 20px; display: none; }
        #timerVal { font-size: 45px; font-weight: 900; color: white; margin-bottom: 10px; }
        .timer-actions { display: flex; gap: 5px; justify-content: center; }
        .btn-t { background: #1e293b; border: none; color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 11px; }
        .btn-t.active { background: var(--p); }

        .ex-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); animation: slideUp 0.5s ease forwards; }
        .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .ex-name { font-weight: 900; color: white; font-size: 17px; }
        .angle-tag { background: rgba(139, 92, 246, 0.15); color: var(--p); padding: 3px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; }
        .ex-gif { width: 100%; height: 220px; border-radius: 15px; object-fit: cover; margin-bottom: 12px; border: 1px solid #1f2937; background: #000; }
        .ex-meta { display: flex; gap: 10px; margin-bottom: 10px; color: var(--s); font-weight: 800; font-size: 12px; }
        .ex-desc { font-size: 13px; color: #94a3b8; line-height: 1.5; margin-bottom: 12px; }
        .pro-instruction { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; font-size: 11px; border: 1px solid rgba(255,255,255,0.05); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>CALZY TRAIN PRO</h1>
        <p style="color:#64748b; font-size:12px; font-weight:600;">نظام التدريب الموسع 2026</p>
    </div>

    <div class="glass-panel">
        <label class="input-label">الهدف التدريبي</label>
        <div style="display: flex; gap: 8px;">
          
            <select id="goal"><option value="bulk">تضخيم</option><option value="cut">تنشيف</option></select>
        </div>

        <label class="input-label">اختر العضلة</label>
        <select id="muscle">
            <option value="chest">الصدر - Chest</option>
            <option value="back">الظهر - Back</option>
            <option value="legs">الأرجل - Legs</option>
            <option value="shoulders">الأكتاف - Shoulders</option>
            <option value="arms">الذراع - Arms</option>
            
        </select>
        <button class="btn-generate" onclick="buildProgram()">توليد التمارين الآن ⚡</button>
    </div>

    <div id="timerHub" class="timer-hub">
        <p style="font-size: 10px; color: var(--p); font-weight: 800;">عداد الراحة</p>
        <div id="timerVal">01:00</div>
        <div class="timer-actions">
            <button class="btn-t" onclick="setRest(45)">45ث</button>
            <button class="btn-t active" onclick="setRest(60)">60ث</button>
            <button class="btn-t" onclick="setRest(90)">90ث</button>
            <button class="btn-t" onclick="toggleTimer()" id="timerCtrl" style="background:var(--s)">ابدأ</button>
        </div>
    </div>

    <div id="workoutContainer"></div>
</div>

<script>
    const trainingLibrary = {
        gym: {
            chest: [
                {n: "Flat Bench Press", a: "قوة عامة", v: "4 × 8", d: "بناء أساسي لسماكة الصدر.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Bench-Press.gif", i: "ثبت قدميك جيداً."},
                {n: "Incline DB Press", a: "الصدر العالي", v: "3 × 10", d: "لمظهر ممتلئ تحت الترقوة.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Incline-Dumbbell-Press.gif", i: "الميل 30 درجة فقط."},
           
                {n: "Machine Fly", a: "عزل وتوسيع", v: "3 × 15", d: "إطالة رائعة لألياف الصدر.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Pec-Deck-Fly.gif", i: "افرد صدرك للخارج."},
                {n: "Cable Crossover", a: "الصدر الداخلي", v: "3 × 15", d: "تحديد الخط المنتصف.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Cable-Crossover.gif", i: "توقف ثانية عند التلاقي."},

                {n: "DB Pullover", a: "توسيع القفص الصدري", v: "3 × 12", d: "تمرين كلاسيكي رائع.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Pullover.gif", i: "تنفس بعمق عند النزول."},
            
            ],
            back: [
                {n: "Deadlift", a: "شامل", v: "3 × 6", d: "ملك تمارين القوة.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Deadlift.gif", i: "ظهرك مفرود تماماً."},
                {n: "Lat Pulldown", a: "عرض", v: "4 × 10", d: "بناء شكل الـ V.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Lat-Pulldown.gif", i: "اسحب بكوعك للخلف."},
            
                {n: "Seated Row", a: "منتصف الظهر", v: "3 × 12", d: "يركز على الترابيس.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Seated-Cable-Row.gif", i: "اعتصر لوحي الكتف."},
                {n: "One Arm Row", a: "عزل", v: "3 × 10", d: "توازن العضلات.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Row.gif", i: "اسحب نحو الحوض."},
                {n: "Pull-ups", a: "عرض شامل", v: "3 × Max", d: "أفضل تمرين وزن جسم.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Pull-up.gif", i: "صدرك للأعلى."},
            
                
            ],
            legs: [
                {n: "Barbell Squat", a: "شامل", v: "4 × 8", d: "أساس قوة الرجل.", g: "https://gymvisual.com/animated-gifs/14133-barbell-anderson-squat.html?search_query=Barbell+Squat++&results=243", i: "انزل بخصرك لأسفل."},
                {n: "Leg Press", a: "ضخامة", v: "3 × 12", d: "دفع أوزان ثقيلة.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Leg-Press.gif", i: "لا تقفل ركبتك في الأعلى."},
                {n: "Leg Extension", a: "أماميات", v: "3 × 15", d: "تحديد رؤوس الفخذ.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Leg-Extension.gif", i: "اعتصر في القمة."},
                {n: "Lying Leg Curl", a: "خلفيات", v: "3 × 12", d: "عزل الفخذ الخلفي.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Lying-Leg-Curl.gif", i: "حوضك ثابت على الجهاز."},
                {n: "Lunges", a: "توازن", v: "3 × 12", d: "قوة وتناسق.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Lunge.gif", i: "ظهرك مستقيم."},
                {n: "Romanian Deadlift", a: "خلفيات وقوة", v: "4 × 10", d: "إطالة جبارة للخلفيات.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Romanian-Deadlift.gif", i: "ادفع الحوض للخلف."},
                {n: "Calf Raises", a: "سمانة", v: "4 × 20", d: "بناء السمانة.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Standing-Calf-Raise.gif", i: "مدى حركي كامل."},
                {n: "Hip Adduction", a: "داخلي", v: "3 × 15", d: "تقوية العضلات الضامة.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Lever-Seated-Hip-Adduction.gif", i: "تحكم في الفتح."}
            ],
            shoulders: [
                {n: "Overhead Press", a: "شامل", v: "4 × 8", d: "عرض وضخامة الكتف.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Shoulder-Press.gif", i: "شد بطنك جيداً."},
                {n: "Lateral Raise", a: "جانبي", v: "4 × 15", d: "سر تدوير الكتف.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Lateral-Raise.gif", i: "ارفع بمستوى الكتف."},
                {n: "Front Raise", a: "أمامي", v: "3 × 12", d: "عزل الأمامي.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Front-Raise.gif", i: "بدون مرجحة."},
                {n: "Face Pulls", a: "خلفي", v: "3 × 15", d: "تحسين القوام.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Face-Pull.gif", i: "اسحب للجبهة."},
                {n: "Arnold Press", a: "شامل ذكي", v: "3 × 10", d: "يضرب كل الزوايا.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Arnold-Press.gif", i: "دوران محكم."},
                {n: "Reverse Fly", a: "خلفي عزل", v: "3 × 15", d: "توازن الكتف.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Reverse-Fly.gif", i: "سحب هادئ."},
                {n: "Upright Row", a: "ترابيس وجانبي", v: "3 × 12", d: "قمة الكتف.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Upright-Row.gif", i: "كوعك للأعلى."},
           
            ],
            arms: [
                {n: "Barbell Curl", a: "باي حجم", v: "3 × 10", d: "ضخامة الباي.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Curl.gif", i: "كوعك بجانبك."},
                {n: "Pushdown", a: "تراي تحديد", v: "3 × 12", d: "الرأس الخارجي.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/04/Pushdown.gif", i: "افرد للآخر."},
                {n: "Hammer Curl", a: "سماكة", v: "3 × 12", d: "الساعد والباي.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Hammer-Curl.gif", i: "مسكة المطرقة."},
                {n: "Skull Crusher", a: "تراي ضخامة", v: "3 × 10", d: "الرأس الطويل.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/EZ-Barbell-Skullcrusher.gif", i: "تحكم فوق الرأس."},
                {n: "Concentration", a: "باي تدوير", v: "3 × 12", d: "قمة الباي.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Concentration-Curl.gif", i: "عزل تام."},
                {n: "Dips", a: "تراي وزن جسم", v: "3 × Max", d: "تمرين إنهاء جبار.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Weighted-Bench-Dip.gif", i: "صدرك للأعلى."},
                {n: "Preacher Curl", a: "باي عزل", v: "3 × 12", d: "منع الغش.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Preacher-Curl.gif", i: "مدى كامل."},
                {n: "Cable Curl", a: "ضخ دم", v: "3 × 15", d: "توتر مستمر.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Cable-Bicep-Curl.gif", i: "اعتصر في النهاية."}
            ],
            abs: [
                {n: "Crunches", a: "علوي", v: "3 × 20", d: "أساس البطن.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Crunch.gif", i: "ارفع كتفك فقط."},
                {n: "Leg Raise", a: "سفلي", v: "3 × 15", d: "أسفل البطن.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Leg-Raise.gif", i: "لا تلمس الأرض."},
                {n: "Plank", a: "ثبات", v: "3 × 1m", d: "تقوية الـ Core.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Plank.gif", i: "جسمك مستقيم."},
                {n: "Russian Twist", a: "جوانب", v: "3 × 20", d: "تحديد الخواصر.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Russian-Twist.gif", i: "المس الأرض."},
                {n: "Bicycle", a: "شامل", v: "3 × 20", d: "تنسيق كامل.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Bicycle-Crunch.gif", i: "كوع للركبة."},
                {n: "Climbers", a: "حرق", v: "3 × 30s", d: "رفع نبض القلب.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Mountain-Climber.gif", i: "سرعة ثابتة."},
                {n: "Hanging Legs", a: "سفلي قوي", v: "3 × 10", d: "تمرين احترافي.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Hanging-Leg-Raise.gif", i: "بدون تأرجح."},
                {n: "Ab Wheel", a: "قوة قصوى", v: "3 × 10", d: "تمرين جبار.", g: "https://fitnessprogramer.com/wp-content/uploads/2021/02/Wheel-Rollout.gif", i: "تحكم في الرجوع."}
            ]
        }
    };

    let timerId, tRem = 60, isRunning = false;

    function buildProgram() {
        const goal = document.getElementById('goal').value;
        const muscle = document.getElementById('muscle').value;
        const workout = trainingLibrary.gym[muscle];
        
        if(!workout) return;

        document.getElementById('timerHub').style.display = 'block';
        const container = document.getElementById('workoutContainer');
        container.innerHTML = workout.map((ex, idx) => `
            <div class="ex-card" style="animation-delay: ${idx * 0.1}s">
                <div class="ex-header">
                    <span class="ex-name">${ex.n}</span>
                    <span class="angle-tag">${ex.a}</span>
                </div>
                <img src="${ex.g}" class="ex-gif" loading="lazy">
                <div class="ex-meta">
                    <span>⚡ الشدة: ${goal === 'cut' ? '4 × 20' : ex.v}</span>
                    <span>⏱️ راحة: ${goal === 'cut' ? '45ث' : '90ث'}</span>
                </div>
                <p class="ex-desc">${ex.d}</p>
                <div class="pro-instruction"><b>PRO TIP:</b> ${ex.i}</div>
            </div>
        `).join('');
        
        window.scrollTo({ top: 400, behavior: 'smooth' });
    }

    function setRest(s) {
        clearInterval(timerId); tRem = s; isRunning = false;
        document.getElementById('timerCtrl').innerText = "ابدأ";
        document.querySelectorAll('.btn-t').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        updateTUI();
    }

    function toggleTimer() {
        if(isRunning) {
            clearInterval(timerId);
            document.getElementById('timerCtrl').innerText = "استئناف";
        } else {
            timerId = setInterval(() => {
                tRem--; updateTUI();
                if(tRem <= 0) { clearInterval(timerId); alert("انتهى وقت الراحة!"); resetT(); }
            }, 1000);
            document.getElementById('timerCtrl').innerText = "إيقاف";
        }
        isRunning = !isRunning;
    }

    function resetT() { tRem = 60; updateTUI(); isRunning = false; document.getElementById('timerCtrl').innerText = "ابدأ"; clearInterval(timerId); }
    function updateTUI() {
        let m = Math.floor(tRem/60), s = tRem%60;
        document.getElementById('timerVal').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
    }
</script>
</body>
</html>
