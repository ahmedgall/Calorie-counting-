<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calzy | موسوعة الـ 50 حقيقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #8b5cf6; --s: #10b981; --bg: #030712; --card: #111827; --danger: #ef4444; --text: #f9fafb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; line-height: 1.6; }
        
        .header { text-align: center; margin-bottom: 30px; padding: 30px 10px; background: linear-gradient(to bottom, #1e1b4b, transparent); border-radius: 0 0 50px 50px; }
        .header h1 { font-size: 28px; font-weight: 900; color: var(--p); }
        .header p { color: #94a3b8; font-size: 14px; margin-top: 5px; }

        .articles-container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        .article-card { 
            background: var(--card); 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
            cursor: pointer;
        }
        
        .myth-banner { 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            gap: 15px;
        }
        
        .myth-banner .icon { font-size: 20px; color: var(--danger); font-weight: 900; }
        .myth-banner h2 { font-size: 15px; font-weight: 700; color: #fca5a5; flex: 1; }

        .article-content { 
            padding: 0 20px 20px 20px; 
            display: none; 
            border-top: 1px solid rgba(255,255,255,0.05);
            background: #0f172a;
            border-radius: 0 0 20px 20px;
        }

        .article-card.active .article-content { display: block; animation: slideDown 0.4s ease; }
        .article-card.active .myth-banner { background: rgba(139, 92, 246, 0.1); border-radius: 20px 20px 0 0; }

        .fact-title { color: var(--s); font-weight: 800; margin: 15px 0 10px; display: block; font-size: 14px; }
        .article-text { color: #cbd5e1; font-size: 14px; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <h1>موسوعة الـ 50 خرافة 🕵️‍♂️</h1>
    <p>كل ما تحتاجه لتصحيح مفاهيمك الرياضية بناءً على العلم</p>
</div>

<div class="articles-container" id="content">
    </div>

<script>
    const data = [
        { q: "تمارين البطن تحرق دهون الكرش", a: "دهون الجسم تُفقد بشكل كلي ولا يمكن استهداف منطقة معينة. تمرين البطن يقوي العضلة فقط، والدايت هو ما يظهرها." },
        { q: "الكارديو على الريق يحرق دهون أكثر", a: "لا يوجد فرق علمي بين الكارديو على الريق أو بعد الأكل في إجمالي حرق الدهون اليومي. المهم هو عجز السعرات." },
        { q: "البروتين يسبب فشل كلوي", a: "للشخص السليم، تناول البروتين حتى 2.2 جرام لكل كيلو من وزنه آمن تماماً. الكلى مصممة لمعالجة البروتين بكفاءة." },
        { q: "يجب تبديل التمارين كل أسبوع لمفاجأة العضلة", a: "العضلات لا تفاجأ! التطور يأتي من 'الزيادة التدريجية' في الأوزان أو العداد على نفس التمارين لفترة طويلة." },
        { q: "المرأة تصبح ضخمة كالرجال عند رفع الأثقال", a: "هرمون التستوستيرون عند النساء أقل بـ 15-20 مرة من الرجال، مما يجعل الضخامة العضلية الضخمة مستحيلة طبيعياً." },
        { q: "المكملات الغذائية سحرية وبدونها لن تنجح", a: "المكملات تمثل 5% فقط من النتيجة. الأساس هو التغذية والنوم والتدريب المستمر." },
        { q: "العرق الكثير يعني حرق دهون أعلى", a: "العرق هو وسيلة لتبريد الجسم وفقدان سوائل وأملاح. يمكنك حرق دهون وأنت في غرفة مكيفة دون عرق غزير." },
        { q: "شرب الماء وسط الأكل يسبب الكرش", a: "الماء لا يحتوي على سعرات، بل يساعد في الهضم والشعور بالشبع. الكرش نتاج فائض سعرات لا أكثر." },
        { q: "التوقف عن التمرين يحول العضل لدهون", a: "الأنسجة العضلية تختلف تماماً عن الدهنية. عند التوقف، تضمر العضلة وتزيد الدهون بسبب قلة الحرق، لكن لا يتحول أحدهما للآخر." },
        { q: "الميزان هو المقياس الوحيد للتقدم", a: "الميزان لا يفرق بين العضل والدهون والمياه. قياسات المازورة وشكل الملابس والمرآة أدق بكثير." },
        { q: "الكربوهيدرات بعد الساعة 6 مساءً تزيد الوزن", a: "الجسم لا يملك ساعة توقيت للدهون. إذا كنت ضمن سعراتك اليومية، يمكنك أكل الكاربو في أي وقت." },
        { q: "الدهون الصحية (زيت زيتون، مكسرات) لا تزيد الوزن", a: "الدهون الصحية مفيدة جداً، لكنها عالية السعرات (الجرام بـ 9 سعرات). الإفراط فيها سيزيد وزنك حتماً." },
        { q: "يجب الشعور بالألم (DOMS) بعد كل تمرين كدليل على جودته", a: "الألم ليس مقياساً وحيداً. التطور في الأوزان والأداء هو المقياس الحقيقي للنمو العضلي." },
        { q: "تمرين الحديد يوقف الطول للمراهقين", a: "بالعكس، التمرين يقوي العظام ويزيد كثافتها. الطول محكوم بالجينات طالما لا توجد إصابة مباشرة في مراكز النمو." },
        { q: "لازم تشرب بروتين شيك خلال 30 دقيقة بعد التمرين", a: "نافذة البروتين واسعة (تصل لـ 4 ساعات أو أكثر). المهم هو إجمالي بروتين اليوم كاملاً." },
        { q: "الأوزان الخفيفة للتنشيف والثقيلة للتضخيم", a: "الأوزان الثقيلة ضرورية في التنشيف للحفاظ على الكتلة العضلية من الهدم." },
        { q: "المنشطات آمنة إذا تم أخذها بجرعات صغيرة", a: "المنشطات تؤثر على الهرمونات الطبيعية والقلب والكبد، ولا يوجد بروتوكول 'آمن' بنسبة 100%." },
        { q: "الجلوتامين أساسي لعملية الاستشفاء", a: "الجسم يصنع الجلوتامين، والأبحاث تظهر أن تأثيره في بناء العضلات ضعيف جداً مقارنة بالكرياتين والبروتين." },
        { q: "حوارق الدهون ستقوم بكل العمل نيابة عنك", a: "بدون دايت، حوارق الدهون لا قيمة لها. هي تزيد الحرق بنسبة ضئيلة جداً (أقل من 50-100 سعرة)." },
        { q: "تمارين العزل أفضل من التمارين المركبة للمبتدئين", a: "التمارين المركبة (سكوات، ضغط، عقلة) هي الأساس لأنها تشغل أكثر من عضلة وتفرز هرمونات نمو أكثر." },
        { q: "لا يمكنك بناء العضلات مع نظام نباتي", a: "يمكن ذلك، لكنه يتطلب دقة عالية في دمج مصادر البروتين النباتي لضمان اكتمال الأحماض الأمينية." },
        { q: "شرب القهوة قبل التمرين يسبب الجفاف", a: "الكافيين مدر خفيف للبول، لكن السوائل الموجودة في القهوة تعوض ذلك، وهي من أفضل محفزات الطاقة." },
        { q: "يجب أداء الكارديو قبل الحديد", a: "الأفضل أداء الحديد أولاً لاستنزاف طاقة الجليكوجين في العضلات، ثم الكارديو لحرق الدهون." },
        { q: "تمرين العضلة مرة واحدة أسبوعياً هو الأفضل", a: "الأبحاث تظهر أن تمرين العضلة مرتين أسبوعياً يعطي نتائج أفضل للنمو (Frequency)." },
        { q: "حزام البطن يحرق دهون الخصر", a: "الحزام يزيد التعرق الموضعي (فقدان مياه) ولا يلمس الدهون المخزنة تحت الجلد." },
        { q: "خل التفاح على الريق يذيب الدهون", a: "خل التفاح مفيد للسكر والهضم، لكنه لا يذيب الدهون سحرياً بدون عجز سعرات." },
        { q: "الساونا تحرق الدهون", a: "الساونا تفقدك سوائل فقط. بمجرد شرب الماء سيعود وزنك كما كان." },
        { q: "تمارين الإطالة قبل التمرين تمنع الإصابات", a: "الإطالة الساكنة قبل التمرين قد تضعف العضلة. الأفضل هو 'الإحماء الديناميكي' (حركة)." },
        { q: "البيض يرفع الكوليسترول الضار", a: "كوليسترول الطعام له تأثير طفيف على كوليسترول الدم لدى أغلب الناس. البيض مصدر بروتين ممتاز." },
        { q: "عضلة السمانة لا تنمو لأنها وراثية فقط", a: "الوراثة تلعب دوراً، لكن السمانة عضلة كأي عضلة أخرى تحتاج لحمل تدريبي عالٍ وتكرارات مكثفة لتنمو." },
        { q: "تمرين العقلة يزيد الطول", a: "العقلة تفرد الفقرات مؤقتاً وتعطيك إحساساً بالطول، لكنها لا تغير طول العظام الحقيقي." },
        { q: "السكر الأسمر أصح من الأبيض في الدايت", a: "الاثنان متقاربان جداً في السعرات والتأثير على الأنسولين. السكر هو سكر في النهاية." },
        { q: "الملح ممنوع تماماً في التنشيف", a: "الصوديوم ضروري لنقل الإشارات العصبية وانقباض العضلات. منعه تماماً يسبب تشنجات وهبوط." },
        { q: "الكرياتين يسبب تساقط الشعر", a: "لا توجد دراسة قوية تربط الكرياتين بتساقط الشعر. هو أكثر مكمل مدروس وآمن عالمياً." },
        { q: "تمرين الصدر السفلي يرفع الثدي المترهل", a: "التمارين تبني العضلة تحت الدهون، لكن شد الترهل الجلدي يحتاج لضبط نسبة الدهون أو تدخل جراحي في الحالات الشديدة." },
        { q: "النوم لـ 4 ساعات كافٍ للرياضي", a: "البناء العضلي يحدث أثناء النوم العميق (7-9 ساعات). قلة النوم تدمر مستويات التستوستيرون." },
        { q: "الديتوكس (تنظيف السموم) ضروري للجسم", a: "لديك كبد وكلى يقومان بتنظيف السموم 24 ساعة مجاناً. مشروبات الديتوكس مجرد تسويق." },
        { q: "رفع الأوزان يسبب الانزلاق الغضروفي حتماً", a: "التكنيك الخلط هو السبب. رفع الأوزان بتكنيك صح يقوي الظهر ويحمي الفقرات." },
        { q: "البروتين النباتي لا يبني عضلات", a: "غير صحيح. مع تنويع المصادر (فول، عدس، صويا) يمكن بناء كتلة عضلية ممتازة." },
        { q: "يجب الوصول للفشل العضلي في كل مجموعة", a: "الفشل العضلي أداة قوية لكن استخدامه دائماً يجهد الجهاز العصبي. يكفي الوصول له في آخر مجموعة." },
        { q: "أحزمة الظهر تمنع إصابات الظهر دائماً", a: "الحزام يدعمك في الأوزان الثقيلة جداً، لكن الاعتماد الدائم عليه يضعف عضلات الكور (Core) الطبيعية." },
        { q: "الماء الدافئ والليمون يحرق دهون البطن", a: "مفيد للمناعة وفيتامين C، لكنه لا يملك خواص حارقة للدهون." },
        { q: "تمارين الـ HIIT أفضل من الكارديو الثابت دائماً", a: "الـ HIIT موفر للوقت، لكن الكارديو الثابت (المشي السريع) أسهل في الاستشفاء ولا يجهد المفاصل." },
        { q: "اللبن يسبب طبقة مياه تحت الجلد", a: "هذا يخص المحترفين قبل البطولات فقط. للشخص العادي، اللبن مصدر رائع للكالسيوم والبروتين." },
        { q: "المالتي فيتامين يعوض نقص الخضروات", a: "المكمل لا يحتوي على الألياف والمغذيات الدقيقة الموجودة في الخضار الطبيعي." },
        { q: "حرق الدهون يتحول لطاقة حرارية فقط", a: "84% من الدهون المحروقة تخرج عن طريق التنفس (ثاني أكسيد الكربون) والباقي عن طريق السوائل." },
        { q: "لا يمكن بناء العضل وحرق الدهون في نفس الوقت", a: "يمكن ذلك للمبتدئين أو العائدين من انقطاع (Body Recomposition)." },
        { q: "الواي بروتين كيميائي ومضر", a: "الواي بروتين مستخلص من الحليب (شرش اللبن) وهو منتج طبيعي 100%." },
        { q: "تمارين الضغط كافية لبناء صدر ضخم", a: "الضغط ممتاز للبداية، لكن للضخامة ستحتاج لأوزان خارجية لزيادة التحدي على العضلة." },
        { q: "الرياضة وحدها تكفي لخسارة الوزن", a: "يمكنك حرق 500 سعرة في ساعة تمرين، وأكلها في دقيقتين بقطعة بيتزا. الدايت هو الأساس." }
    ];

    function render() {
        const container = document.getElementById('content');
        container.innerHTML = data.map((item, i) => `
            <div class="article-card" onclick="this.classList.toggle('active')">
                <div class="myth-banner">
                    <div class="icon">×</div>
                    <h2>خرافة: ${item.q}</h2>
                </div>
                <div class="article-content">
                    <span class="fact-title">التصحيح العلمي ✅</span>
                    <p class="article-text">${item.a}</p>
                </div>
            </div>
        `).join('');
    }
    render();
</script>

</body>
</html>
